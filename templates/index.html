{% extends "base.html" %}
{% block title %}My To-Do List{% endblock %}

{% block content %}

<!-- ── Input Panel ─────────────────────────────────────────────── -->
<section class="input-panel card">
  <h2 class="panel-heading">Add a New Task</h2>
  <div class="input-row">
    <input
      type="text"
      id="task-title"
      class="input-field"
      placeholder="Task title (required)"
      autocomplete="off"
    />
    <select id="task-priority" class="input-select">
      <option value="low">🟢 Low</option>
      <option value="medium" selected>🟠 Medium</option>
      <option value="high">🔴 High</option>
    </select>
  </div>
  <textarea
    id="task-description"
    class="input-textarea"
    placeholder="Optional description…"
    rows="2"
  ></textarea>
  <div class="input-actions">
    <span id="input-error" class="error-msg" aria-live="polite"></span>
    <button id="add-btn" class="btn btn-primary" onclick="addTask()">＋ Add Task</button>
  </div>
</section>

<!-- ── Filter Bar ──────────────────────────────────────────────── -->
<section class="filter-bar">
  <button class="btn filter-btn active" data-status="all"    onclick="filterTasks('all')">All Tasks</button>
  <button class="btn filter-btn"        data-status="active"    onclick="filterTasks('active')">Active</button>
  <button class="btn filter-btn"        data-status="completed" onclick="filterTasks('completed')">Completed</button>
</section>

<!-- ── Task Counter ────────────────────────────────────────────── -->
<section class="counter-bar">
  <div class="counter-badge counter-total">
    <span class="counter-num" id="count-total">0</span>
    <span class="counter-label">Total</span>
  </div>
  <div class="counter-badge counter-active">
    <span class="counter-num" id="count-active">0</span>
    <span class="counter-label">Active</span>
  </div>
  <div class="counter-badge counter-completed">
    <span class="counter-num" id="count-completed">0</span>
    <span class="counter-label">Completed</span>
  </div>
</section>

<!-- ── Task List ───────────────────────────────────────────────── -->
<section id="task-list" class="task-list" aria-label="Task list">
  <!-- Tasks are injected here by JavaScript -->
</section>

{% endblock %}
