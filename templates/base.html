<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Flask To-Do App{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- Sticky Navigation Bar -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">✅</span>
      <span class="nav-title">Flask To-Do</span>
    </div>
    <div class="nav-badge-wrap">
      <span class="nav-label">Tasks:</span>
      <span id="nav-counter" class="nav-badge">0</span>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Web Programming with Python &amp; JavaScript Lab (SEC035) &mdash; Assignment 4</p>
  </footer>

  <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
